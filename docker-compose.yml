services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: hrms_app
    container_name: hrms_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - hrms_app_network
    depends_on:
      - hrms_db
      - hrms_redis
    env_file:
      - .env
    command: php-fpm

  hrms_nginx:
    image: nginx:alpine
    container_name: hrms_nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hrms_app_network

  hrms_db:
    image: mysql:8.0
    container_name: hrms_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "${APP_DB_PORT}:${DB_PORT}"
    networks:
      - hrms_app_network

  hrms_redis:
    image: redis:alpine
    container_name: hrms_redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - hrms_app_network

  hrms_reverb:
    image: hrms_app  # same as app service
    container_name: hrms_reverb
    working_dir: /var/www
    command: php artisan reverb:start
    volumes:
      - ./:/var/www
    depends_on:
      - app
    ports:
      - "6001:6001"
    networks:
      - hrms_app_network
    env_file:
      - .env

  hrms_queue:
    image: hrms_app
    container_name: hrms_queue
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - hrms_redis
    networks:
      - hrms_app_network
    env_file:
      - .env

  hrms_scheduler:
    image: hrms_app
    container_name: hrms_scheduler
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      - app
    networks:
      - hrms_app_network
    env_file:
      - .env

networks:
  hrms_app_network:

volumes:
  mysqldata:
